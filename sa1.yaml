esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  name_add_mac_suffix: false
  project:
    name: esphome.web
    version: dev
  # this is a bit of a hack; setting the status to online blindly.
  # however, the offline'ing script will eventually clear it if, on startup, the modbus doesn't connect
  on_boot:
    priority: 600.0
    then:
      - binary_sensor.template.publish:
          id: device_online_status
          state: ON
  
esp32:
  board: esp32dev
  framework:
    type: arduino

logger:
  #level: VERY_VERBOSE   #useful for debugging modbus
  # this turns off the warning about "slow" components; which modbus just takes time, yo. Chill.
  logs:
    component: ERROR

api:
  encryption:
    key: ${api_key}

ota:
  - platform: esphome
    password: ${ota_pass}

## Disabled since this is ETHERNET based
#improv_serial:
#wifi:
#  ap: {}
#captive_portal:

# for board rev.7 and up
ethernet:
  type: "RTL8201"
  mdc_pin: GPIO16
  mdio_pin: GPIO17
  clk:
    mode: CLK_EXT_IN
    pin:
      number: 0
      ignore_strapping_warning: true
  phy_addr: 0
  phy_registers:
    - address: 0x10
      value: 0x1FFA
      page_id: 0x07
  manual_ip:
    static_ip: ${static_ip}
    gateway: ${gateway}
    subnet: ${subnet}

web_server:
  port: 80
  ota: False
  version: 3
  local: True

